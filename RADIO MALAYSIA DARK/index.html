      border-radius: 50px;

      cursor: pointer;

      align-items: center;
      gap: 8px;

      border-radius: 50px;
      font-weight: 600;

      text-align: center;

      align-items: center;
      justify-content: center;
      gap: 10px;

    .bar:nth-child(3) { animation-delay: 0.4s; }

      gap: 8px;
      background: #111;
      padding: 8px 15px;

        { name: 'Langkawi FM', url: 'https://28103.live.streamtheworld.com/LANGKAWI_FMAAC.aac', type: 'aac' },
        { name: 'Bayu FM', url: 'https://stream-eu-a.rcs.revma.com/ywpe7mqb54uvv/6_glpo8niyqr7e02/playlist.m3u8', type: 'm3u8' },
        { name: 'MyFriends FM', url: 'https://cast3.asurahosting.com/proxy/myfriend/stream', type: 'mp3' },
        { name: 'RADIOROSAK', url: 'https://radiorosak.radioca.st/stream', type: 'mp3' },
        { name: 'Jazz FM', url: 'https://stream-eu-a.rcs.revma.com/c718dfvbv4uvv/54_7d1x7i1isy7w02/playlist.m3u8', type: 'm3u8' },
        { name: 'Jazz Lounge FM', url: 'https://eu8.fastcast4u.com/proxy/lch?mp=/1', type: 'mp3' },
        { name: 'Opus FM', url: 'https://stream-eu-a.rcs.revma.com/aqvp4yvbv4uvv/51_xbchzd3wxcmv02/playlist.m3u8', type: 'm3u8' },
        { name: 'Pilihan FM', url: 'https://d2kziuzkf9oizb.cloudfront.net/rd003/playlist.m3u8', type: 'm3u8' },
        { name: 'MyKampus FM', url: 'https://usa10.fastcast4u.com/voicespl', type: 'mp3' }
      ];

      // --- DOM elements ---
      const audio = document.getElementById('audioPlayer');
      const playBtn = document.getElementById('playBtn');
      const playIcon = document.getElementById('playIcon');
      const btnText = document.getElementById('btnText');
      const stationNameSpan = document.getElementById('stationName');
      const currentStationDiv = document.getElementById('currentStation');
      const visualizer = document.getElementById('visualizer');
      const volumeSlider = document.getElementById('volumeSlider');
      const searchInput = document.getElementById('searchInput');
      const stationsGrid = document.getElementById('stationsGrid');
      const loading = document.getElementById('loading');
      const errorMsg = document.getElementById('errorMessage');
      const allTab = document.getElementById('allStationsTab');
      const favTab = document.getElementById('favoritesTab');
      const favoritesBtn = document.getElementById('favoritesBtn');
      const favoritesText = document.getElementById('favoritesText');
      const sleepTimerBtn = document.getElementById('sleepTimerBtn');
      const sleepTimerDropdown = document.getElementById('sleepTimerDropdown');
      const sleepTimerText = document.getElementById('sleepTimerText');
      const timerDisplay = document.getElementById('timerDisplay');
      const cancelTimerOpt = document.getElementById('cancelTimer');
      const customMinutes = document.getElementById('customMinutes');
      const increaseBtn = document.getElementById('increaseMinutes');
      const decreaseBtn = document.getElementById('decreaseMinutes');
      const setCustomBtn = document.getElementById('setCustomTimer');

      // state
      let currentStation = null;
      let hls = null;
      let favorites = new Set();
      let isShowingFavorites = false;
      let sleepInterval = null;
      let remainingSeconds = 0;

      // load favorites
      try {
        const saved = localStorage.getItem('radioFav');
        if (saved) favorites = new Set(JSON.parse(saved));
      } catch (e) {}

      function saveFav() {
        localStorage.setItem('radioFav', JSON.stringify([...favorites]));
      }

      // Fungsi notifikasi yang konsisten
      function showNotification(message) {
        // Buang notifikasi sedia ada
        document.querySelectorAll('.notification').forEach(el => el.remove());
        
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.innerText = message;
        document.body.appendChild(notif);
        
        setTimeout(() => {
          if (notif.parentNode) notif.remove();
        }, 2500);
      }

      // render
      function renderStations(list) {
        stationsGrid.innerHTML = list.map(s => {
          const isFav = favorites.has(s.name);
          return `<div class="station-card" data-name="${s.name}">
            <button class="favorite-btn ${isFav ? 'active' : ''}" data-name="${s.name}"><i class="fas fa-heart"></i></button>
            ${s.name}
          </div>`;
        }).join('');
        document.querySelectorAll('.station-card').forEach(card => {
          card.addEventListener('click', (e) => {
            if (e.target.closest('.favorite-btn')) return;
            const name = card.dataset.name;
            const station = stations.find(s => s.name === name);
            if (station) playStation(station);
          });
        });
        document.querySelectorAll('.favorite-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const name = btn.dataset.name;
            if (favorites.has(name)) favorites.delete(name);
            else favorites.add(name);
            saveFav();
            btn.classList.toggle('active');
            if (isShowingFavorites) renderStations(getFavList());
            else renderStations(stations.filter(s => s.name.toLowerCase().includes(searchInput.value.toLowerCase())));
            showNotification(favorites.has(name) ? 'Ditambah ke kegemaran' : 'Dialih keluar dari kegemaran');
          });
        });
      }

      function getFavList() {
        return stations.filter(s => favorites.has(s.name));
      }

      function filterBySearch() {
        const term = searchInput.value.toLowerCase();
        const source = isShowingFavorites ? getFavList() : stations;
        return source.filter(s => s.name.toLowerCase().includes(term));
      }

      function playStation(station) {
        if (!station) return;
        if (hls) { hls.destroy(); hls = null; }
        audio.pause();
        currentStation = station;
        stationNameSpan.innerText = station.name;
        currentStationDiv.classList.add('playing');
        document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active'));
        const activeCard = document.querySelector(`.station-card[data-name="${station.name}"]`);
        if (activeCard) activeCard.classList.add('active');

        loading.style.display = 'block';
        errorMsg.style.display = 'none';

        const playStream = () => {
          audio.play().then(() => {
            loading.style.display = 'none';
            updatePlayState(true);
            showNotification(`Memainkan: ${station.name}`); // Notifikasi stesen dimainkan
          }).catch(err => {
            console.warn(err);
            loading.style.display = 'none';
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Ralat main balik. Sila cuba stesen lain.';
            updatePlayState(false);
          });
        };

        if (station.type === 'm3u8' && Hls.isSupported()) {
          hls = new Hls();
          hls.loadSource(station.url);
          hls.attachMedia(audio);
          hls.on(Hls.Events.MANIFEST_PARSED, playStream);
          hls.on(Hls.Events.ERROR, (ev, data) => {
            console.error('HLS error', data);
            errorMsg.style.display = 'block';
            errorMsg.innerText = 'Gagal memuat strim HLS.';
            loading.style.display = 'none';
          });
        } else {
          audio.src = station.url;
          playStream();
        }
      }

      function updatePlayState(playing) {
        if (playing) {
          playIcon.innerHTML = '<i class="fas fa-pause"></i>';
          btnText.innerText = 'Jeda';
          visualizer.classList.add('active');
        } else {
          playIcon.innerHTML = '<i class="fas fa-play"></i>';
          btnText.innerText = 'Main';
          visualizer.classList.remove('active');
        }
      }

      // toggle play
      playBtn.addEventListener('click', () => {
        if (!currentStation) { 
          showNotification('Sila pilih stesen dahulu'); 
          return; 
        }
        if (audio.paused) {
          audio.play().then(() => {
            updatePlayState(true);
            showNotification('Radio dimainkan'); // NOTIF DIMAINKAN
          }).catch(e => showNotification('Ralat main'));
        } else {
          audio.pause();
          updatePlayState(false);
          showNotification('Radio dijeda'); // NOTIF DIJEDA
        }
      });

      volumeSlider.addEventListener('input', () => { audio.volume = volumeSlider.value; });

      // search
      searchInput.addEventListener('input', () => { renderStations(filterBySearch()); });

      // tabs
      allTab.addEventListener('click', () => {
        allTab.classList.add('active');
        favTab.classList.remove('active');
        isShowingFavorites = false;
        favoritesText.innerText = 'Kegemaran';
        favoritesBtn.classList.remove('active');
        renderStations(filterBySearch());
      });
      favTab.addEventListener('click', () => {
        favTab.classList.add('active');
        allTab.classList.remove('active');
        isShowingFavorites = true;
        favoritesText.innerText = 'Semua Stesen';
        favoritesBtn.classList.add('active');
        renderStations(filterBySearch());
      });
      favoritesBtn.addEventListener('click', () => {
        if (isShowingFavorites) allTab.click();
        else favTab.click();
      });

      // sleep timer dropdown
      sleepTimerBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        sleepTimerDropdown.classList.toggle('active');
      });
      document.addEventListener('click', (e) => {
        if (!sleepTimerBtn.contains(e.target) && !sleepTimerDropdown.contains(e.target)) {
          sleepTimerDropdown.classList.remove('active');
        }
      });

      function setTimer(minutes) {
        if (sleepInterval) clearInterval(sleepInterval);
        remainingSeconds = minutes * 60;
        sleepTimerText.innerText = `${minutes} Minit`;
        timerDisplay.classList.add('active');
        updateTimerDisplay();
        sleepInterval = setInterval(() => {
          remainingSeconds--;
          if (remainingSeconds <= 0) {
            clearInterval(sleepInterval);
            audio.pause();
            updatePlayState(false);
            timerDisplay.classList.remove('active');
            sleepTimerText.innerText = 'Pemasa Tidur';
            showNotification('⏰ Pemasa tamat, radio berhenti');
          } else updateTimerDisplay();
        }, 1000);
        sleepTimerDropdown.classList.remove('active');
        showNotification(`⏰ Pemasa tidur: ${minutes} minit`);
      }

      function updateTimerDisplay() {
        if (remainingSeconds > 0) {
          const m = Math.floor(remainingSeconds / 60);
          const s = remainingSeconds % 60;
          timerDisplay.innerText = `⏰ ${m}:${s.toString().padStart(2,'0')}`;
        }
      }

      document.querySelectorAll('.timer-option[data-minutes]').forEach(opt => {
        opt.addEventListener('click', () => setTimer(parseInt(opt.dataset.minutes)));
      });
      cancelTimerOpt.addEventListener('click', () => {
        if (sleepInterval) clearInterval(sleepInterval);
        sleepTimerText.innerText = 'Pemasa Tidur';
        timerDisplay.classList.remove('active');
        sleepInterval = null;
        sleepTimerDropdown.classList.remove('active');
        showNotification('⏰ Pemasa tidur dibatalkan');
      });
      increaseBtn.addEventListener('click', () => { customMinutes.value = Math.min(300, parseInt(customMinutes.value)+1); });
      decreaseBtn.addEventListener('click', () => { customMinutes.value = Math.max(1, parseInt(customMinutes.value)-1); });
      setCustomBtn.addEventListener('click', () => {
        let mins = parseInt(customMinutes.value);
        if (isNaN(mins) || mins<1) mins=1;
        setTimer(mins);
      });

      // initial render
      renderStations(stations);
      audio.volume = 0.7;
    })();
  </script>
</body>
