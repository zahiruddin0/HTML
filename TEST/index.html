<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <meta name="description" content="Kalendar Malaysia 2026 interaktif dengan mod gelap/terang, navigasi bulan, dan zum gambar penuh." />
  <title>Kalendar Malaysia 2026 • Dark/Light + Zum</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0f0f11;
      --card: #16161a;
      --text: #e0e0e5;
      --text-light: #a0a0b0;
      --accent: #7c6eff;
      --accent-dark: #5e50d0;
      --border: #2a2a35;
      --nav-bg: #141418e8;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
      --transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    [data-theme="light"] {
      --bg: #f4f4f9;
      --card: #ffffff;
      --text: #1c1c1f;
      --text-light: #6e6e73;
      --accent: #5e5ce6;
      --accent-dark: #4a47c0;
      --border: #d9d9e3;
      --nav-bg: #fffffff2;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      transition: background 0.35s ease, color 0.3s ease;
    }

    header {
      text-align: center;
      padding: 36px 20px 28px;
      position: relative;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(130deg, var(--accent) 0%, #b084ff 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .theme-toggle {
      position: absolute;
      top: 28px;
      right: 28px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--accent);
      width: 50px;
      height: 50px;
      border-radius: 60px;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      transition: 0.2s;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .theme-toggle:hover {
      transform: scale(1.05);
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .nav-container {
      background: var(--nav-bg);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 99;
      padding: 12px 0;
      transition: background 0.2s;
    }

    .month-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px 14px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .month-btn {
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }

    .month-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 5px 12px rgba(108, 92, 231, 0.3);
    }

    .container {
      max-width: 1380px;
      margin: 0 auto;
      padding: 48px 24px 90px;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 36px 30px;
    }

    .month-card {
      background: var(--card);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: var(--shadow);
      cursor: pointer;
    }

    .month-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
    }

    .month-card.highlight {
      box-shadow: 0 0 0 3px var(--accent), 0 15px 30px rgba(0,0,0,0.3);
    }

    .month-title {
      padding: 20px 16px;
      text-align: center;
      font-size: 1.45rem;
      font-weight: 700;
      background: linear-gradient(120deg, rgba(108, 92, 231, 0.08), rgba(108, 92, 231, 0.02));
      border-bottom: 1px solid var(--border);
      color: var(--accent);
      letter-spacing: -0.2px;
    }

    .month-image-wrap {
      position: relative;
      width: 100%;
      background: #f9f9fc;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .month-image {
      width: 100%;
      height: auto;
      display: block;
      transition: filter 0.2s;
    }

    .month-image-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      color: var(--text-light);
      font-size: 0.85rem;
      font-weight: 500;
      gap: 8px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .month-image-placeholder.hidden {
      display: none;
    }

    /* MODAL LIGHTBOX */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.94);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    .modal.active {
      display: flex;
    }

    .modal-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .modal-img-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    #modalImage {
      max-width: 92vw;
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
      transition: transform 0.2s ease-out;
      cursor: default;
      user-select: none;
      -webkit-user-drag: none;
    }

    #modalImage.zoomed {
      cursor: grab;
    }

    #modalImage.zoomed:active {
      cursor: grabbing;
    }

    .close-btn {
      position: absolute;
      top: 28px;
      right: 32px;
      font-size: 3rem;
      font-weight: 300;
      color: white;
      background: rgba(20, 20, 28, 0.7);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      z-index: 10010;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      font-family: monospace;
    }

    .close-btn:hover {
      background: #ff3b30;
      transform: rotate(90deg);
    }

    .zoom-hint {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 0.8rem;
      backdrop-filter: blur(10px);
      pointer-events: none;
      z-index: 10010;
      white-space: nowrap;
      font-weight: 500;
    }

    .modal-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      z-index: 10005;
    }

    .modal-loader.hidden {
      display: none;
    }

    .modal-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #b084ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* screen reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 680px) {
      .month-nav { gap: 8px; }
      .month-btn { padding: 6px 14px; font-size: 0.8rem; }
      .year-grid { gap: 24px; }
      h1 { font-size: 2rem; }
      .theme-toggle { width: 44px; height: 44px; top: 20px; right: 20px; font-size: 1.3rem; }
      .close-btn { width: 44px; height: 44px; font-size: 2rem; top: 16px; right: 18px; }
      .zoom-hint { font-size: 0.7rem; bottom: 12px; white-space: nowrap; }
    }
  </style>
</head>
<body data-theme="dark">

  <button class="theme-toggle" id="themeBtn" aria-label="Tukar tema gelap/terang">☀️</button>

  <header>
    <h1>🗓️ Kalendar Malaysia 2026</h1>
  </header>

  <div class="nav-container">
    <div class="month-nav" id="monthNav" role="navigation" aria-label="Navigasi bulan">
      <button class="month-btn" data-month="jan" aria-label="Januari 2026">Jan</button>
      <button class="month-btn" data-month="feb" aria-label="Februari 2026">Feb</button>
      <button class="month-btn" data-month="mac" aria-label="Mac 2026">Mac</button>
      <button class="month-btn" data-month="apr" aria-label="April 2026">Apr</button>
      <button class="month-btn" data-month="mei" aria-label="Mei 2026">Mei</button>
      <button class="month-btn" data-month="jun" aria-label="Jun 2026">Jun</button>
      <button class="month-btn" data-month="jul" aria-label="Julai 2026">Jul</button>
      <button class="month-btn" data-month="ogo" aria-label="Ogos 2026">Ogo</button>
      <button class="month-btn" data-month="sep" aria-label="September 2026">Sep</button>
      <button class="month-btn" data-month="okt" aria-label="Oktober 2026">Okt</button>
      <button class="month-btn" data-month="nov" aria-label="November 2026">Nov</button>
      <button class="month-btn" data-month="dis" aria-label="Disember 2026">Dis</button>
    </div>
  </div>

  <div class="container">
    <div class="year-grid" id="calendarGrid" role="main" aria-label="Kalendar Malaysia 2026">
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div class="modal" id="imageModal" role="dialog" aria-label="Gambar kalendar penuh" aria-modal="true">
    <span class="close-btn" id="closeModal" aria-label="Tutup gambar" tabindex="0">✕</span>
    <div class="modal-container" id="modalContainer">
      <div class="modal-img-wrapper">
        <div class="modal-loader" id="modalLoader">
          <div class="modal-spinner"></div>
          <span>Memuatkan gambar...</span>
        </div>
        <img id="modalImage" src="" alt="Kalendar Malaysia 2026 - Bulan" draggable="false">
      </div>
    </div>
    <div class="zoom-hint" id="zoomHint">🔍 Pinch / Ctrl + roda tetikus untuk zum | Tarik untuk pan</div>
  </div>

  <div id="liveRegion" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <script>
    const monthsData = [
      { id: "jan", name: "Januari 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/01-2026-my-v2-1024x880.png" },
      { id: "feb", name: "Februari 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/02-2026-my-v2-1024x880.png" },
      { id: "mac", name: "Mac 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/03-2026-my-v2-1024x880.png" },
      { id: "apr", name: "April 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/04-2026-my-v2-1024x880.png" },
      { id: "mei", name: "Mei 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/05-2026-my-v2-1024x880.png" },
      { id: "jun", name: "Jun 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/06-2026-my-v2-1024x880.png" },
      { id: "jul", name: "Julai 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/07-2026-my-v2-1024x880.png" },
      { id: "ogo", name: "Ogos 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/08-2026-my-v2-1024x880.png" },
      { id: "sep", name: "September 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/09-2026-my-v2-1024x880.png" },
      { id: "okt", name: "Oktober 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/10-2026-my-v2-1024x880.png" },
      { id: "nov", name: "November 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/11-2026-my-v2-1024x880.png" },
      { id: "dis", name: "Disember 2026", img: "https://raw.githubusercontent.com/zahiruddin0/HTML/refs/heads/main/MALAYSIA%20CALENDER%202026/12-2026-my-v2-1024x880.png" }
    ];

    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const liveRegion = document.getElementById('liveRegion');

    function announce(msg) {
      liveRegion.textContent = '';
      requestAnimationFrame(() => { liveRegion.textContent = msg; });
    }

    /* ---------- RENDER CALENDAR ---------- */
    const gridContainer = document.getElementById('calendarGrid');

    function renderCalendar() {
      gridContainer.innerHTML = '';
      monthsData.forEach(month => {
        const card = document.createElement('div');
        card.className = 'month-card';
        card.id = month.id;
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `Lihat gambar penuh ${month.name}`);

        const titleDiv = document.createElement('div');
        titleDiv.className = 'month-title';
        titleDiv.textContent = month.name;

        const wrapDiv = document.createElement('div');
        wrapDiv.className = 'month-image-wrap';

        const placeholder = document.createElement('div');
        placeholder.className = 'month-image-placeholder';
        placeholder.innerHTML = '<div class="spinner"></div>Memuatkan...';

        const imgElem = document.createElement('img');
        imgElem.src = month.img;
        imgElem.alt = month.name;
        imgElem.className = 'month-image';
        imgElem.loading = 'lazy';
        imgElem.setAttribute('data-full', month.img);

        imgElem.addEventListener('load', () => {
          placeholder.classList.add('hidden');
        });

        imgElem.addEventListener('error', () => {
          placeholder.innerHTML = 'Gagal memuatkan gambar';
        });

        wrapDiv.appendChild(placeholder);
        wrapDiv.appendChild(imgElem);

        card.appendChild(titleDiv);
        card.appendChild(wrapDiv);
        gridContainer.appendChild(card);
      });
    }
    renderCalendar();

    /* ---------- THEME TOGGLE ---------- */
    const themeBtn = document.getElementById('themeBtn');
    const rootBody = document.body;

    function setTheme(theme) {
      rootBody.setAttribute('data-theme', theme);
      localStorage.setItem('calendar-theme', theme);
      themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
      themeBtn.setAttribute('aria-label', theme === 'dark' ? 'Tukar tema terang' : 'Tukar tema gelap');
    }

    const savedTheme = localStorage.getItem('calendar-theme');
    if (savedTheme && (savedTheme === 'dark' || savedTheme === 'light')) {
      setTheme(savedTheme);
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(prefersDark ? 'dark' : 'light');
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('calendar-theme')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    });

    themeBtn.addEventListener('click', () => {
      const current = rootBody.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    /* ---------- SMOOTH SCROLL NAVIGATION ---------- */
    function getNavHeight() {
      const nav = document.querySelector('.nav-container');
      return nav ? nav.offsetHeight : 0;
    }

    document.querySelectorAll('.month-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const monthId = btn.getAttribute('data-month');
        const targetCard = document.getElementById(monthId);
        if (targetCard) {
          const cardRect = targetCard.getBoundingClientRect();
          const navHeight = getNavHeight();
          const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          const viewportHeight = window.innerHeight;
          const cardCenter = cardRect.top + scrollTop + cardRect.height / 2;
          const targetScroll = cardCenter - navHeight - (viewportHeight - navHeight) / 2;

          window.scrollTo({
            top: Math.max(0, targetScroll),
            behavior: prefersReducedMotion ? 'auto' : 'smooth'
          });

          targetCard.classList.add('highlight');
          setTimeout(() => targetCard.classList.remove('highlight'), 800);
        }
      });
    });

    /* ========== LIGHTBOX + ZOOM + PAN ========== */
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeModalBtn = document.getElementById('closeModal');
    const modalContainerDiv = document.getElementById('modalContainer');
    const modalLoader = document.getElementById('modalLoader');
    const zoomHint = document.getElementById('zoomHint');

    let scale = 1;
    let translateX = 0, translateY = 0;
    let isDragging = false;
    let startX = 0, startY = 0;
    let currentModalMonthIndex = -1;

    let initialPinchDist = 0;
    let initialScale = 1;
    let initialTransX = 0, initialTransY = 0;
    let pinchCenterX = 0, pinchCenterY = 0;

    function resetImageTransform() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    function applyTransform() {
      modalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
      modalImg.classList.toggle('zoomed', scale > 1);
    }

    function constrainPan() {
      if (!modalImg.naturalWidth || !modalImg.naturalHeight) return;
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      const scaledW = modalImg.naturalWidth * scale;
      const scaledH = modalImg.naturalHeight * scale;
      let maxX = Math.max(0, (scaledW - viewW) / 2);
      let maxY = Math.max(0, (scaledH - viewH) / 2);
      if (scaledW <= viewW) maxX = 0;
      if (scaledH <= viewH) maxY = 0;
      translateX = Math.min(maxX, Math.max(-maxX, translateX));
      translateY = Math.min(maxY, Math.max(-maxY, translateY));
    }

    function openModal(imgSrc, startRect, monthIndex) {
      currentModalMonthIndex = monthIndex;
      resetImageTransform();
      modalLoader.classList.remove('hidden');
      modalImg.style.opacity = '0';
      modalImg.src = imgSrc;
      modalImg.alt = monthsData[monthIndex].name;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';

      if (prefersReducedMotion) {
        modalImg.style.transition = 'none';
        modalImg.style.transform = 'translate(0px, 0px) scale(1)';
        modalImg.style.opacity = '1';
        if (modalImg.complete && modalImg.naturalWidth) {
          modalLoader.classList.add('hidden');
        }
        announce(`Gambar penuh ${monthsData[monthIndex].name} dibuka`);
        return;
      }

      modalImg.style.transition = 'transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2), opacity 0.3s';
      if (startRect) {
        const viewCenterX = window.innerWidth / 2;
        const viewCenterY = window.innerHeight / 2;
        const imgCenterX = startRect.left + startRect.width / 2;
        const imgCenterY = startRect.top + startRect.height / 2;
        const offsetX = imgCenterX - viewCenterX;
        const offsetY = imgCenterY - viewCenterY;
        const startScale = Math.min(0.4, (startRect.width / window.innerWidth) * 0.8);
        modalImg.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${startScale})`;
      } else {
        modalImg.style.transform = 'scale(0.7)';
      }
      modalImg.style.opacity = '0';

      setTimeout(() => {
        modalImg.style.transition = 'transform 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.2), opacity 0.35s';
        modalImg.style.transform = 'translate(0px, 0px) scale(1)';
        modalImg.style.opacity = '1';
        setTimeout(() => {
          scale = 1;
          translateX = 0;
          translateY = 0;
          applyTransform();
          modalImg.style.transition = '';
        }, 580);
      }, 20);

      announce(`Gambar penuh ${monthsData[monthIndex].name} dibuka`);
    }

    function closeModal() {
      if (!modal.classList.contains('active')) return;
      document.body.style.overflow = '';

      if (prefersReducedMotion) {
        modal.classList.remove('active');
        resetImageTransform();
        announce('Gambar ditutup');
        return;
      }

      modalImg.style.transition = 'transform 0.3s ease, opacity 0.25s';
      modalImg.style.transform = 'scale(0.85)';
      modalImg.style.opacity = '0';
      setTimeout(() => {
        modal.classList.remove('active');
        resetImageTransform();
        modalImg.style.transition = '';
        announce('Gambar ditutup');
      }, 280);
    }

    document.addEventListener('click', (e) => {
      const card = e.target.closest('.month-card');
      if (card && !modal.classList.contains('active')) {
        const imgElement = card.querySelector('img');
        if (imgElement) {
          const monthIndex = monthsData.findIndex(m => m.id === card.id);
          const rect = imgElement.getBoundingClientRect();
          openModal(imgElement.getAttribute('data-full') || imgElement.src, rect, monthIndex);
        }
      }
    });

    document.addEventListener('keydown', (e) => {
      const card = e.target.closest('.month-card');
      if (card && (e.key === 'Enter' || e.key === ' ')) {
        e.preventDefault();
        card.click();
      }
    });

    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal || e.target === modalContainerDiv) closeModal();
    });

    modalImg.addEventListener('load', () => {
      modalLoader.classList.add('hidden');
    });

    /* ---------- ZOOM with Wheel ---------- */
    modalContainerDiv.addEventListener('wheel', (e) => {
      if (!modal.classList.contains('active')) return;
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.92 : 1.08;
      let newScale = scale * delta;
      newScale = Math.min(Math.max(1, newScale), 6);
      if (Math.abs(newScale - scale) < 0.01) return;

      const mouseX = e.clientX;
      const mouseY = e.clientY;
      const rect = modalImg.getBoundingClientRect();
      const ratioX = (mouseX - rect.left) / rect.width;
      const ratioY = (mouseY - rect.top) / rect.height;
      const oldScale = scale;
      scale = newScale;
      const dx = (ratioX - 0.5) * (rect.width * (scale / oldScale - 1));
      const dy = (ratioY - 0.5) * (rect.height * (scale / oldScale - 1));
      translateX += dx;
      translateY += dy;
      constrainPan();
      applyTransform();
    }, { passive: false });

    /* ---------- PAN with Mouse ---------- */
    modalImg.addEventListener('mousedown', (e) => {
      if (!modal.classList.contains('active') || scale <= 1) return;
      e.preventDefault();
      isDragging = true;
      startX = e.clientX - translateX;
      startY = e.clientY - translateY;
      modalImg.style.transition = 'none';
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging || !modal.classList.contains('active')) return;
      e.preventDefault();
      translateX = e.clientX - startX;
      translateY = e.clientY - startY;
      constrainPan();
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        modalImg.style.transition = '';
      }
    });

    /* ---------- TOUCH: PAN & PINCH ZOOM ---------- */
    modalImg.addEventListener('touchstart', (e) => {
      if (!modal.classList.contains('active')) return;
      if (e.touches.length === 2) {
        e.preventDefault();
        const t1 = e.touches[0], t2 = e.touches[1];
        initialPinchDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        initialScale = scale;
        initialTransX = translateX;
        initialTransY = translateY;
        pinchCenterX = (t1.clientX + t2.clientX) / 2;
        pinchCenterY = (t1.clientY + t2.clientY) / 2;
        modalImg.style.transition = 'none';
      } else if (e.touches.length === 1 && scale > 1) {
        e.preventDefault();
        isDragging = true;
        startX = e.touches[0].clientX - translateX;
        startY = e.touches[0].clientY - translateY;
        modalImg.style.transition = 'none';
      }
    }, { passive: false });

    modalImg.addEventListener('touchmove', (e) => {
      if (!modal.classList.contains('active')) return;
      if (e.touches.length === 2) {
        e.preventDefault();
        const t1 = e.touches[0], t2 = e.touches[1];
        const currentDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        if (initialPinchDist > 0) {
          let newScale = initialScale * (currentDist / initialPinchDist);
          newScale = Math.min(Math.max(1, newScale), 6);
          scale = newScale;
          const cx = (t1.clientX + t2.clientX) / 2;
          const cy = (t1.clientY + t2.clientY) / 2;
          translateX = initialTransX + (cx - pinchCenterX);
          translateY = initialTransY + (cy - pinchCenterY);
          constrainPan();
          applyTransform();
        }
      } else if (e.touches.length === 1 && isDragging && scale > 1) {
        e.preventDefault();
        translateX = e.touches[0].clientX - startX;
        translateY = e.touches[0].clientY - startY;
        constrainPan();
        applyTransform();
      }
    }, { passive: false });

    modalImg.addEventListener('touchend', (e) => {
      if (e.touches.length === 0) {
        isDragging = false;
        modalImg.style.transition = '';
      }
      if (e.touches.length < 2) {
        initialPinchDist = 0;
      }
    });

    /* ---------- DOUBLE CLICK ZOOM ---------- */
    modalImg.addEventListener('dblclick', (e) => {
      if (!modal.classList.contains('active')) return;
      e.preventDefault();
      if (scale > 1.2) {
        resetImageTransform();
        constrainPan();
        applyTransform();
      } else {
        const rect = modalImg.getBoundingClientRect();
        const ratioX = (e.clientX - rect.left) / rect.width;
        const ratioY = (e.clientY - rect.top) / rect.height;
        const oldScale = scale;
        scale = 2.2;
        translateX += (ratioX - 0.5) * (rect.width * (scale / oldScale - 1));
        translateY += (ratioY - 0.5) * (rect.height * (scale / oldScale - 1));
        constrainPan();
        applyTransform();
      }
    });

    /* ---------- KEYBOARD: ESCAPE & ARROW NAVIGATION ---------- */
    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('active')) return;

      if (e.key === 'Escape') {
        e.preventDefault();
        closeModal();
        return;
      }

      if (e.key === 'ArrowRight') {
        e.preventDefault();
        if (currentModalMonthIndex < monthsData.length - 1) {
          const nextIndex = currentModalMonthIndex + 1;
          resetImageTransform();
          openModal(monthsData[nextIndex].img, null, nextIndex);
        }
      }

      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (currentModalMonthIndex > 0) {
          const prevIndex = currentModalMonthIndex - 1;
          resetImageTransform();
          openModal(monthsData[prevIndex].img, null, prevIndex);
        }
      }
    });

    /* ---------- UPDATE ZOOM HINT BASED ON INPUT ---------- */
    function updateZoomHint() {
      if ('ontouchstart' in window) {
        zoomHint.textContent = '🔍 Cencung untuk zum | Cengkam untuk pan';
      } else {
        zoomHint.textContent = '🔍 Ctrl + roda tetikus untuk zum | Klik gambar untuk pan';
      }
    }
    updateZoomHint();
  </script>
</body>
</html>
